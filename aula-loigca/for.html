<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Comando For</title>
</head>
<body>
    <script>
        let tabuada = parseInt(prompt("Digite a Tabuada desejada: "))

        document.write("1x" + tabuada + " = " + (1*tabuada) + "<br>")
        document.write("2x" + tabuada + " = " + (2*tabuada) + "<br>")
        document.write("3x" + tabuada + " = " + (3*tabuada) + "<br>")
        document.write("4x" + tabuada + " = " + (4*tabuada) + "<br>")
        document.write("5x" + tabuada + " = " + (5*tabuada) + "<br>")
        document.write("6x" + tabuada + " = " + (6*tabuada) + "<br>")
        document.write("7x" + tabuada + " = " + (7*tabuada) + "<br>")
        document.write("8x" + tabuada + " = " + (8*tabuada) + "<br>")
        document.write("9x" + tabuada + " = " + (9*tabuada) + "<br>")
        document.write("10x" + tabuada + " = " + (10*tabuada) + "<br>")

        for(let n=1; n<=10; n++){
            document.write(n + "x" + tabuada + " = " + tabuada*n + "<br>")
        }




                                                        


    </script>
    
</body>
</html>
